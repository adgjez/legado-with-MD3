name: Android Test Fallback

on:
  push:
    branches:
      - test/fallback-destructive
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install AAPT2 runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libc6-i386 lib32stdc++6 lib32z1 libncurses6 libtinfo6

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Sanitize Gradle AAPT2 caches
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/daemon
          rm -rf ~/.gradle/native
          rm -rf ~/.gradle/caches/*/transforms
          rm -rf ~/.gradle/caches/*/transforms-*
          rm -rf ~/.gradle/caches/modules-2/files-2.1/com.android.tools.build/aapt2

      - name: Build arm64 debug APK
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-XX:+UseParallelGC\ -Xmx4g\ -Xms256m\ -XX:MaxMetaspaceSize=768m\ -Dfile.encoding=UTF-8
            -Dorg.gradle.workers.max=2
        run: |
          VERSION_CODE=$(($(date -u +%s) / 60))
          ./gradlew :app:assembleAppDebug \
            -Pabi=arm64-v8a \
            -PVERSION_CODE="$VERSION_CODE" \
            -PRELEASE_STORE_FILE=ci-debug.keystore \
            -PRELEASE_STORE_PASSWORD=legado-ci-debug \
            -PRELEASE_KEY_ALIAS=legado-ci-debug \
            -PRELEASE_KEY_PASSWORD=legado-ci-debug \
            --no-daemon \
            --max-workers=2 \
            --stacktrace

      - name: Resolve APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk -type f -name '*.apk' | head -n 1)
          APK_NAME=$(basename "$APK_PATH")
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado-test-fallback-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Publish test release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_NAME="${{ steps.apk.outputs.name }}"
          TAG_NAME="test-fallback-$(date -u +%Y%m%d-%H%M%S)"
          NOTES_FILE="test-release-notes.md"
          cat > "$NOTES_FILE" <<EOF
          Test build with fallbackToDestructiveMigration()

          Commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
          APK: $APK_NAME
          EOF

          gh release create "$TAG_NAME" \
            "${{ steps.apk.outputs.path }}" \
            --title "Test Fallback Destructive Migration" \
            --notes-file "$NOTES_FILE" \
            --prerelease